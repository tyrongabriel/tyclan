# prometheus-values.yaml
# Configuration optimized for K3s clusters with reduced resource usage

prometheus:
  prometheusSpec:
    # Reduce retention for edge/IoT deployments
    retention: 7d

    # Lower resource requirements for K3s
    resources:
      # requests:
      #   memory: 256Mi
      #   cpu: 100m
      limits:
        memory: 1Gi
        cpu: 500m

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "longhorn-rc-3"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Additional scrape configs for K3s-specific endpoints
    additionalScrapeConfigs:
      # Scrape K3s server metrics
      - job_name: "k3s-server"
        static_configs:
          - targets: ["localhost:10250"]
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

grafana:
  persistence:
    enabled: true
    storageClassName: "longhorn-rc-3" # Replace with your StorageClass
    accessModes: ["ReadWriteOnce"]
    size: 5Gi

# Disable components that may be too heavy for K3s
alertmanager:
  enabled: true
  alertmanagerSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: "longhorn-rc-3"
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      # requests:
      #   memory: 64Mi
      #   cpu: 50m
      limits:
        memory: 256Mi
        cpu: 100m

# Use lighter-weight node exporter configuration
nodeExporter:
  enabled: true
  resources:
    # requests:
    #   memory: 32Mi
    #   cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m

# Kube-state-metrics for Kubernetes object metrics
kubeStateMetrics:
  enabled: true
  resources:
    # requests:
    #   memory: 64Mi
    #   cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m
